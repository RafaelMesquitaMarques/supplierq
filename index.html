// ═══════════════════════════════════════════════════════
function ForcePasswordChange({user, onComplete, lang}){
  const [newPwd, setNewPwd] = useState('');
  const [confirmPwd, setConfirmPwd] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e){
    e.preventDefault();
    setError('');
    if(newPwd.length<6){ setError(lang==='fr'?'Minimum 6 caractères':'Minimum 6 characters'); return; }
    if(newPwd!==confirmPwd){ setError(lang==='fr'?'Les mots de passe ne correspondent pas':'Passwords do not match'); return; }
    setLoading(true);
    try{
      const hash = await hashPassword(newPwd);
      const users = await loadUsers();
      const updated = users.map(u=>u.id===user.id
        ?{...u,passwordHash:hash,mustChangePassword:false,passwordChangedAt:new Date().toISOString()}
        :u
      );
      await saveUsers(updated);
      const updatedUser = updated.find(u=>u.id===user.id);
      onComplete(updatedUser);
    }catch(e){ setError('Error saving. Try again.'); }
    finally{ setLoading(false); }
  }

  return <div className="login-screen">
    <div className="login-box">
      <div className="login-logo">
        <div className="login-logo-icon">SQ</div>
        <div>
          <div style={{fontSize:18,fontWeight:700}}>SupplierQ</div>
          <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.05em'}}>by Foliot</div>
        </div>
      </div>

      <div style={{background:'var(--amb-l)',border:'1px solid var(--amb-b)',borderRadius:'var(--r2)',padding:'12px 14px',marginBottom:20,display:'flex',gap:10,alignItems:'flex-start'}}>
        <span style={{fontSize:20,flexShrink:0}}>🔐</span>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:'var(--amb)',marginBottom:3}}>
            {lang==='fr'?'Changement de mot de passe requis':'Password change required'}
          </div>
          <div style={{fontSize:12,color:'var(--tx2)'}}>
            {lang==='fr'
              ?`Bonjour ${user.name}, vous devez définir un nouveau mot de passe avant de continuer.`
              :`Hello ${user.name}, you must set a new password before continuing.`}
          </div>
        </div>
      </div>

      {error && <div className="login-error">⚠️ {error}</div>}

      <form onSubmit={handleSubmit}>
        <div className="fg">
          <label>{lang==='fr'?'Nouveau mot de passe':'New password'} *</label>
          <input type="password" value={newPwd} onChange={e=>setNewPwd(e.target.value)}
            placeholder="••••••••" required autoFocus style={{width:'100%'}}/>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>
            {lang==='fr'?'Minimum 6 caractères':'Minimum 6 characters'}
          </div>
        </div>
        <div className="fg">
          <label>{lang==='fr'?'Confirmer le mot de passe':'Confirm password'} *</label>
          <input type="password" value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)}
            placeholder="••••••••" required style={{width:'100%'}}/>
          {confirmPwd && newPwd && <div style={{fontSize:11,marginTop:4,color:newPwd===confirmPwd?'var(--grn)':'var(--red)',fontWeight:600}}>
            {newPwd===confirmPwd
              ?(lang==='fr'?'✓ Les mots de passe correspondent':'✓ Passwords match')
              :(lang==='fr'?'✗ Ne correspondent pas':'✗ Do not match')}
          </div>}
        </div>
        <button type="submit" className="btn btn-primary"
          style={{width:'100%',justifyContent:'center',marginTop:8,padding:'10px'}}
          disabled={loading||newPwd!==confirmPwd||newPwd.length<6}>
          {loading?(lang==='fr'?'Sauvegarde…':'Saving…'):(lang==='fr'?'Définir le mot de passe':'Set password & continue')}
        </button>
      </form>
    </div>
  </div>;
}

function LoginScreen({onLogin, lang, setLang, dark, setDark}){
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [users, setUsers] = useState([]);

  useEffect(()=>{ loadUsers().then(setUsers); },[]);

  async function handleLogin(e){
    e.preventDefault();
    setLoading(true); setError('');
    try{
      const hash = await hashPassword(password);
      const user = users.find(u=>u.email.toLowerCase()===email.toLowerCase() && u.passwordHash===hash && u.active!==false);
      if(!user){ setError(lang==='fr'?'Email ou mot de passe incorrect':'Incorrect email or password'); setLoading(false); return; }
      onLogin(user);
    }catch{ setError('Error'); setLoading(false); }
  }

  return <div className="login-screen">
    <div style={{position:'absolute',top:16,right:16,display:'flex',gap:6}}>
      <button className="lang-btn" onClick={()=>setLang(l=>l==='en'?'fr':'en')}>{lang==='en'?'FR':'EN'}</button>
      <button className="theme-btn" onClick={()=>setDark(d=>!d)}>{dark?'☀️':'🌙'}</button>
    </div>
    <div className="login-box">
      <div className="login-logo">
        <div className="login-logo-icon">SQ</div>
        <div>
          <div style={{fontSize:20,fontWeight:700}}>SupplierQ</div>
          <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.05em'}}>by Foliot</div>
        </div>
      </div>
      <div style={{fontSize:22,fontWeight:700,marginBottom:4}}>{lang==='fr'?'Connexion':'Sign in'}</div>
      <div style={{fontSize:13,color:'var(--muted)',marginBottom:24}}>{lang==='fr'?'Accédez à votre espace qualité':'Access your quality workspace'}</div>
      {error && <div className="login-error">⚠️ {error}</div>}
      <form onSubmit={handleLogin}>
        <div className="fg"><label>Email</label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="email@foliot.com" required autoFocus/>
        </div>
        <div className="fg"><label>{lang==='fr'?'Mot de passe':'Password'}</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" required style={{width:'100%'}}/>
        </div>
        <button type="submit" className="btn btn-primary" style={{width:'100%',justifyContent:'center',marginTop:8,padding:'10px'}} disabled={loading}>
          {loading?(lang==='fr'?'Connexion…':'Signing in…'):(lang==='fr'?'Se connecter':'Sign in')}
        </button>
      </form>
    </div>
  </div>;
}

//  USER MANAGEMENT PAGE

function UserManagement({lang, currentUser, showToast}){
  const [users, setUsers] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [editUser, setEditUser] = useState(null);
  const [form, setForm] = useState({name:'',email:'',password:'',role:'inspector',sites:['QS'],active:true});
  const [createdUser, setCreatedUser] = useState(null); // show temp password modal
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  useEffect(()=>{ loadUsers().then(setUsers); },[]);

  function toggleSite(s){ set('sites', form.sites.includes(s)?form.sites.filter(x=>x!==s):[...form.sites,s]); }

  async function handleSave(e){
    e.preventDefault();
    if(!form.name||!form.email){ showToast('Fill all required fields','error'); return; }
    if(!form.sites.length){ showToast(lang==='fr'?'Sélectionnez au moins un site':'Select at least one site','error'); return; }

    let hash = editUser?.passwordHash;
    let tempPwd = null;

    if(editUser){
      // Editing — password change optional
      if(form.password) hash = await hashPassword(form.password);
    } else {
      // New user — auto-generate temp password
      tempPwd = generateTempPassword();
      hash = await hashPassword(tempPwd);
    }

    const updated = editUser
      ? users.map(u=>u.id===editUser.id?{...u,name:form.name,email:form.email,role:form.role,sites:form.sites,active:form.active,...(form.password?{passwordHash:hash,mustChangePassword:true}:{})}:u)
      : [...users,{id:Date.now(),name:form.name,email:form.email,passwordHash:hash,role:form.role,sites:form.sites,active:form.active,mustChangePassword:true,createdAt:new Date().toISOString()}];

    setUsers(updated);
    await saveUsers(updated);
    setShowForm(false); setEditUser(null);
    setForm({name:'',email:'',password:'',role:'inspector',sites:['QS'],active:true});

    if(tempPwd){
      setCreatedUser({name:form.name, email:form.email, tempPwd});
    } else {
      showToast(lang==='fr'?'Utilisateur mis à jour':'User updated','success');
    }
  }

  async function toggleActive(user){
    if(user.id===currentUser.id){ showToast(lang==='fr'?'Vous ne pouvez pas vous désactiver':'Cannot deactivate yourself','error'); return; }
    const updated = users.map(u=>u.id===user.id?{...u,active:!u.active}:u);
    setUsers(updated); await saveUsers(updated);
    showToast(user.active?(lang==='fr'?'Désactivé':'Deactivated'):(lang==='fr'?'Activé':'Activated'),'info');
  }

  async function deleteUser(user){
    if(user.id===currentUser.id){ showToast(lang==='fr'?'Impossible de vous supprimer':'Cannot delete yourself','error'); return; }
    if(!confirm((lang==='fr'?'Supprimer':'Delete')+` ${user.name}?`)) return;
    const updated = users.filter(u=>u.id!==user.id);
    setUsers(updated); await saveUsers(updated);
    showToast(lang==='fr'?'Supprimé':'Deleted','warn');
  }

  function startEdit(user){ setEditUser(user); setForm({name:user.name,email:user.email,password:'',role:user.role,sites:user.sites||['QS'],active:user.active!==false}); setShowForm(true); }

  const roleLabel = r => r==='admin'?'Admin':r==='manager'?'Manager':'Inspector';
  const roleClass = r => r==='admin'?'role-admin':r==='manager'?'role-manager':'role-inspector';

  return <div className="page">
    <div className="page-header">
      <div><h1>👥 {lang==='fr'?'Gestion des utilisateurs':'User Management'}</h1>
        <p>{users.length} {lang==='fr'?'utilisateur(s)':'user(s)'}</p></div>
      <button className="btn btn-primary" onClick={()=>{setShowForm(true);setEditUser(null);setForm({name:'',email:'',password:'',role:'inspector',sites:['QS'],active:true});}}>
        + {lang==='fr'?'Nouvel utilisateur':'New user'}
      </button>
    </div>

    {/* TEMP PASSWORD MODAL */}
    {createdUser && <div className="modal-overlay" onClick={()=>setCreatedUser(null)}>
      <div className="modal-box" style={{maxWidth:440}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h2>✅ {lang==='fr'?'Utilisateur créé':'User created'}</h2>
          <button className="modal-close" onClick={()=>setCreatedUser(null)}>✕</button>
        </div>
        <div style={{background:'var(--grn-l)',border:'1px solid var(--grn-b)',borderRadius:'var(--r2)',padding:16,marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--grn)',marginBottom:10}}>
            🔐 {lang==='fr'?'Mot de passe temporaire généré':'Temporary password generated'}
          </div>
          <div style={{fontSize:12,color:'var(--tx2)',marginBottom:12}}>
            {lang==='fr'
              ?`Communiquez ces informations à ${createdUser.name}. Dès la première connexion, il devra définir un nouveau mot de passe.`
              :`Share these credentials with ${createdUser.name}. On first login, they will be required to set a new password.`}
          </div>
          <div style={{background:'var(--surf)',border:'1px solid var(--brd)',borderRadius:'var(--r)',padding:'12px 16px'}}>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:4}}>Email</div>
            <div style={{fontFamily:'var(--fm)',fontSize:14,fontWeight:600,marginBottom:10}}>{createdUser.email}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:4}}>{lang==='fr'?'Mot de passe temporaire':'Temporary password'}</div>
            <div style={{fontFamily:'var(--fm)',fontSize:22,fontWeight:700,color:'var(--grn)',letterSpacing:4}}>{createdUser.tempPwd}</div>
          </div>
        </div>
        <div style={{fontSize:12,color:'var(--amb)',background:'var(--amb-l)',border:'1px solid var(--amb-b)',borderRadius:'var(--r)',padding:'8px 12px',marginBottom:16}}>
          ⚠️ {lang==='fr'?'Notez ce mot de passe maintenant. Il ne sera plus affiché.':'Note this password now. It will not be shown again.'}
        </div>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>setCreatedUser(null)}>
          {lang==='fr'?'J\'ai noté le mot de passe':'I have noted the password'}
        </button>
      </div>
    </div>}

    {showForm && <div className="form-card" style={{marginBottom:20,border:'2px solid var(--grn-b)'}}>
      <div className="form-card-title">{editUser?(lang==='fr'?'Modifier utilisateur':'Edit user'):(lang==='fr'?'Nouvel utilisateur':'New user')}</div>
      {!editUser && <div style={{background:'var(--blu-l)',border:'1px solid var(--blu-b)',borderRadius:'var(--r)',padding:'8px 12px',marginBottom:12,fontSize:12,color:'var(--blu)'}}>
        💡 {lang==='fr'?'Un mot de passe temporaire sera généré automatiquement.':'A temporary password will be generated automatically.'}
      </div>}
      <form onSubmit={handleSave}>
        <div className="grid2">
          <div className="fg"><label>{lang==='fr'?'Nom complet':'Full name'} *</label>
            <input type="text" value={form.name} onChange={e=>set('name',e.target.value)} required placeholder="Rafael Marques"/></div>
          <div className="fg"><label>Email *</label>
            <input type="email" value={form.email} onChange={e=>set('email',e.target.value)} required placeholder="rafael@foliot.com"/></div>
        </div>
        {editUser && <div className="fg">
          <label>{lang==='fr'?'Nouveau mot de passe':'New password'} <span style={{color:'var(--muted)',fontSize:11}}>{lang==='fr'?'(vide = inchangé)':'(blank = unchanged)'}</span></label>
          <input type="password" value={form.password} onChange={e=>set('password',e.target.value)} placeholder="••••••••"/>
          {form.password && <div style={{fontSize:11,color:'var(--amb)',marginTop:4}}>
            ⚠️ {lang==='fr'?'L\'utilisateur devra changer son mot de passe à la prochaine connexion.':'User will be required to change password on next login.'}
          </div>}
        </div>}
        <div className="grid2">
          <div className="fg"><label>Role *</label>
            <select value={form.role} onChange={e=>set('role',e.target.value)}>
              <option value="admin">Admin</option>
              <option value="manager">Manager</option>
              <option value="inspector">Inspector</option>
            </select>
          </div>
          <div className="fg" style={{display:'flex',alignItems:'center',gap:8,paddingTop:20}}>
            <input type="checkbox" id="u-active" checked={form.active} onChange={e=>set('active',e.target.checked)} style={{accentColor:'var(--grn)',width:16,height:16}}/>
            <label htmlFor="u-active" style={{marginBottom:0,cursor:'pointer'}}>{lang==='fr'?'Compte actif':'Active account'}</label>
          </div>
        </div>
        <div className="fg">
          <label>{lang==='fr'?'Sites autorisés':'Authorized sites'} *</label>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:6}}>
            {SITES.map(s=><div key={s} className={`checkbox-item${form.sites.includes(s)?' checked':''}`} onClick={()=>toggleSite(s)}>
              <input type="checkbox" checked={form.sites.includes(s)} onChange={()=>{}} style={{pointerEvents:'none',accentColor:'var(--grn)'}}/>
              {s} — {SITE_NAMES[s]}
            </div>)}
          </div>
        </div>
        <div className="form-end">
          <button type="button" className="btn btn-secondary" onClick={()=>{setShowForm(false);setEditUser(null);}}>{lang==='fr'?'Annuler':'Cancel'}</button>
          <button type="submit" className="btn btn-primary">{lang==='fr'?'Enregistrer':'Save'}</button>
        </div>
      </form>
    </div>}

    {users.map(user=><div key={user.id} className="user-card">
      <div className="user-avatar-lg" style={{background:avatarColor(user.name)}}>
        {user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{fontWeight:600,fontSize:14}}>{user.name}</span>
          <span className={`role-badge ${roleClass(user.role)}`}>{roleLabel(user.role)}</span>
          {!user.active&&<span style={{fontSize:10,background:'var(--red-l)',color:'var(--red)',padding:'2px 7px',borderRadius:20,fontWeight:600}}>INACTIVE</span>}
          {user.mustChangePassword&&<span style={{fontSize:10,background:'var(--amb-l)',color:'var(--amb)',padding:'2px 7px',borderRadius:20,fontWeight:600}}>🔐 {lang==='fr'?'MDP temporaire':'Temp password'}</span>}
          {user.id===currentUser.id&&<span style={{fontSize:10,background:'var(--grn-l)',color:'var(--grn)',padding:'2px 7px',borderRadius:20,fontWeight:600}}>YOU</span>}
        </div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{user.email}</div>
        <div style={{marginTop:6}}>{(user.sites||[]).map(s=><span key={s} className="site-tag">{s}</span>)}</div>
      </div>
      <div style={{display:'flex',gap:6,flexShrink:0}}>
        <button className="btn btn-secondary btn-sm" onClick={()=>startEdit(user)}>✏️</button>
        <button className="btn btn-secondary btn-sm" onClick={()=>toggleActive(user)} title={user.active?(lang==='fr'?'Désactiver':'Deactivate'):(lang==='fr'?'Activer':'Activate')}>
          {user.active?'🔒':'🔓'}
        </button>
        {user.id!==currentUser.id&&<button className="btn btn-danger btn-sm" onClick={()=>deleteUser(user)}>🗑️</button>}
      </div>
    </div>)}
  </div>;
}

//  PDF GENERATOR
// ═══════════════════════════════════════════════════════
async function generateInspectionPDF(r, lang){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  const W=210, M=14, CW=W-M*2;
  let y=M;

  // ── colours ──────────────────────────────────────────
  const GREEN=[15,107,63], DARK=[13,17,23], GREY=[122,130,148], LIGHT=[240,242,245], RED=[196,43,28], BLUE=[29,78,216];
  const decColor={'use-as-is':GREEN,'rework':[180,83,9],'rejected':RED,'waiting':BLUE};
  const dc = decColor[r.decision]||GREY;

  // ── helpers ───────────────────────────────────────────
  function setFont(size,style='normal',color=DARK){doc.setFontSize(size);doc.setFont('helvetica',style);doc.setTextColor(...color);}
  function line(color=LIGHT){doc.setDrawColor(...color);doc.line(M,y,W-M,y);y+=1;}
  function rect(x,yy,w,h,fill){doc.setFillColor(...fill);doc.rect(x,yy,w,h,'F');}
  function checkPage(need=20){ if(y+need>285){doc.addPage();y=M;drawHeader(true);} }

  // ── HEADER ────────────────────────────────────────────
  function drawHeader(continuation=false){
    // Green top bar
    rect(0,0,W,12,GREEN);
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');doc.setFontSize(15);
    doc.text('SUPPLIERQ',M,8.5);
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text('by Foliot',M+32,8.5);
    doc.setFont('helvetica','bold');doc.setFontSize(9);
    doc.text(lang==='fr'?"RAPPORT D'INSPECTION":'INSPECTION REPORT',W/2,8.5,{align:'center'});
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text(continuation?`${r.ref} (cont.)`:`${r.site} — ${new Date().toLocaleDateString()}`,W-M,8.5,{align:'right'});
    y=18;
    if(!continuation){
      // Report ref badge
      rect(M,y,CW,10,LIGHT);
      setFont(11,'bold',DARK);
      doc.text(r.ref,M+3,y+6.5);
      setFont(8,'normal',GREY);
      doc.text(r.date,W-M-3,y+6.5,{align:'right'});
      y+=14;
    }
  }

  drawHeader();

  // ── SECTION helper ─────────────────────────────────────
  function section(title,icon=''){
    checkPage(18);
    y+=2;
    rect(M,y,CW,7,GREEN);
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold');doc.setFontSize(8.5);
    doc.text(`${icon}  ${title}`,M+3,y+4.8);
    y+=9;
  }

  // ── KEY-VALUE table ────────────────────────────────────
  function kvTable(rows, cols=2){
    const colW=CW/cols;
    for(let i=0;i<rows.length;i+=cols){
      checkPage(8);
      const rowH=7;
      if(i%4===0) rect(M,y,CW,rowH,LIGHT);
      for(let c=0;c<cols;c++){
        const item=rows[i+c];if(!item)break;
        const x=M+c*colW;
        setFont(7,'bold',GREY);
        doc.text(item[0].toUpperCase(),x+2,y+2.8);
        setFont(9,'normal',DARK);
        const val=String(item[1]||'—');
        doc.text(doc.splitTextToSize(val,colW-6)[0],x+2,y+5.8);
      }
      y+=rowH;
    }
    y+=2;
  }

  // ── 1. GENERAL INFO ───────────────────────────────────
  section(lang==='fr'?'INFORMATIONS GÉNÉRALES':'GENERAL INFORMATION','📋');
  kvTable([
    [lang==='fr'?'Fournisseur':'Supplier', r.supplier||'—'],
    [lang==='fr'?'Date':'Date', r.date],
    ['P.O. #', r.po||'—'],
    ['Product #', r.productNo||'—'],
    [lang==='fr'?'Description':'Description', r.description||'—'],
    [lang==='fr'?'Pays':'Country', r.country||'—'],
    ['Delivery #', r.delivery||'—'],
    ['HU', r.hu||'—'],
    [lang==='fr'?'Date réception':'Reception date', r.receptionDate||r.date],
    [lang==='fr'?'Inspecteur':'Inspector', r.inspector||'—'],
    [lang==='fr'?'Site':'Site', r.site||'—'],
    [lang==='fr'?'N° rapport':'Report #', r.ref],
  ]);

  // ── 2. INSPECTION ROUNDS ──────────────────────────────
  section(lang==='fr'?'RONDAS D\'INSPECTION':'INSPECTION ROUNDS','🔍');
  // Table header
  rect(M,y,CW,6,[GREEN[0],GREEN[1],GREEN[2]]);
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(7.5);
  const rcols=[lang==='fr'?'Ronde':'Round','Qté reçue','Inspecté','NC','%'];
  const rwidths=[30,40,40,30,40];
  let rx=M;
  rcols.forEach((h,i)=>{doc.text(h,rx+2,y+4.2);rx+=rwidths[i];});
  y+=6;
  (r.rounds?.length?r.rounds:[{round:1,recv:r.qtyReceived,inspected:r.qtyInspected,nonConf:0,pct:0}]).forEach((rn,i)=>{
    checkPage(7);
    if(i%2===0) rect(M,y,CW,6,LIGHT);
    setFont(8,'normal',DARK);
    rx=M;
    [rn.round, rn.recv??r.qtyReceived??'—', rn.inspected||0, rn.nonConf||0, `${rn.pct||0}%`].forEach((v,i)=>{
      doc.text(String(v),rx+2,y+4.2);rx+=rwidths[i];
    });
    y+=6;
  });
  y+=3;

  // ── 3. DEFECTS ────────────────────────────────────────
  if(r.defects?.length){
    section(lang==='fr'?'DÉFAUTS DÉTECTÉS':'DEFECTS FOUND','⚠️');
    r.defects.forEach((d,i)=>{
      checkPage(7);
      if(i%2===0) rect(M,y,CW,6,LIGHT);
      setFont(8,'normal',DARK);
      doc.text(`• ${d.label}`,M+3,y+4.2);
      if(d.qty) doc.text(`Qty: ${d.qty}`,W-M-20,y+4.2);
      y+=6;
    });
    y+=2;
  }

  // ── 4. DECISION ───────────────────────────────────────
  section(lang==='fr'?'DÉCISION FINALE':'FINAL DECISION','✅');
  checkPage(22);
  rect(M,y,CW,18,dc.map(v=>Math.min(255,v+210)));
  doc.setDrawColor(...dc);doc.setLineWidth(0.8);doc.rect(M,y,CW,18);doc.setLineWidth(0.2);
  setFont(13,'bold',dc);
  const decLabels={'use-as-is':'✓ USE AS IS','rework':'⚠ REWORK','rejected':'✗ REJECTED','waiting':'⏳ WAITING FOR DECISION'};
  doc.text(decLabels[r.decision]||r.decision?.toUpperCase()||'—',W/2,y+8,{align:'center'});
  setFont(8,'normal',dc);
  const qs=`Use as Is: ${r.qtyUseAsIs||0}   Rework: ${r.qtyRework||0}   Rejected: ${r.qtyRejected||0}   Waiting: ${r.qtyWaiting||0}`;
  doc.text(qs,W/2,y+14,{align:'center'});
  y+=22;

  // ── 5. NOTES ─────────────────────────────────────────
  if(r.issues||r.notes){
    section(lang==='fr'?'NOTES / OBSERVATIONS':'NOTES / OBSERVATIONS','📝');
    const txt=[(r.issues&&`Issues: ${r.issues}`),(r.notes&&`Notes: ${r.notes}`)].filter(Boolean).join('\n');
    const lines=doc.splitTextToSize(txt,CW-6);
    lines.forEach(l=>{
      checkPage(6);
      setFont(8,'normal',DARK);
      doc.text(l,M+3,y+4.2);
      y+=5.5;
    });
    y+=3;
  }

  // ── 6. PHOTOS ─────────────────────────────────────────
  if(r.photos?.length){
    section(lang==='fr'?`PHOTOS D'INSPECTION (${r.photos.length})`:`INSPECTION PHOTOS (${r.photos.length})`,'📷');
    const ph_per_row=3, ph_w=(CW-8)/ph_per_row, ph_h=ph_w*0.75;
    for(let i=0;i<r.photos.length;i++){
      const col=i%ph_per_row;
      if(col===0) checkPage(ph_h+12);
      const px=M+col*(ph_w+4), py=y;
      try{
        doc.addImage(r.photos[i].data,'JPEG',px,py,ph_w,ph_h);
      }catch{}
      if(r.photos[i].caption){
        setFont(7,'normal',GREY);
        doc.text(doc.splitTextToSize(r.photos[i].caption,ph_w)[0],px,py+ph_h+3.5);
      }
      if(col===ph_per_row-1||i===r.photos.length-1) y+=ph_h+8;
    }
    y+=2;
  }

  // ── 7. DRAWINGS ───────────────────────────────────────
  if(r.drawings?.filter(d=>d.type?.startsWith('image/')).length){
    const imgDrawings=r.drawings.filter(d=>d.type?.startsWith('image/'));
    section(lang==='fr'?`DESSINS / IMAGES DE RÉFÉRENCE (${imgDrawings.length})`:`REFERENCE DRAWINGS (${imgDrawings.length})`,'📐');
    const dr_w=(CW-4)/2, dr_h=dr_w*0.7;
    for(let i=0;i<imgDrawings.length;i++){
      const col=i%2;
      if(col===0) checkPage(dr_h+12);
      const dx=M+col*(dr_w+4);
      try{ doc.addImage(imgDrawings[i].data,'JPEG',dx,y,dr_w,dr_h); }catch{}
      setFont(7,'normal',GREY);
      doc.text(doc.splitTextToSize(imgDrawings[i].name,dr_w)[0],dx,y+dr_h+3.5);
      if(col===1||i===imgDrawings.length-1) y+=dr_h+8;
    }
  }

  // ── FOOTER on all pages ────────────────────────────────
  const pageCount=doc.getNumberOfPages();
  for(let p=1;p<=pageCount;p++){
    doc.setPage(p);
    rect(0,287,W,10,[30,35,45]);
    doc.setTextColor(180,190,210);doc.setFont('helvetica','normal');doc.setFontSize(7);
    doc.text(`SupplierQ — Foliot | ${r.site} | ${r.ref}`,M,292.5);
    doc.text(`${lang==='fr'?'Généré le':'Generated'} ${new Date().toLocaleString(lang==='fr'?'fr-CA':'en-CA')}`,W/2,292.5,{align:'center'});
    doc.text(`${lang==='fr'?'Page':'Page'} ${p}/${pageCount}`,W-M,292.5,{align:'right'});
  }

  doc.save(`${r.ref}.pdf`);
}

function App(){
  const [site, setSite] = useState('QS');
  const [lang, setLang] = useState('en');
  const [page, setPage] = useState('dashboard');
  const [dark, setDark] = useState(()=>localStorage.getItem('sqm_theme')==='dark');
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | ok | error
  const [toasts, setToasts] = useState([]);
  const [siteDD, setSiteDD] = useState(false);
  const [tick, setTick] = useState(0); // force re-render after data loads
  const [modal, setModal] = useState(null); // {type:'inspection'|'email'|'ncr', record}
  const [editRecord, setEditRecord] = useState(null);
  const [weights, setWeights] = useState({ac:40,pm:25,nc:20,au:15});
  const [thresholds, setThresholds] = useState({A:90,B:75,C:60});
  const [currentUser, setCurrentUser] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('sq_session')||'null'); }catch{ return null; }
  });

  function handleLogin(user){
    setCurrentUser(user);
    localStorage.setItem('sq_session', JSON.stringify(user));
    if(user.role!=='admin' && !user.sites?.includes(site)){
      setSite(user.sites?.[0]||'QS');
    }
    // Login audit is logged after ghLoad completes (in useEffect below)
  }

  function handleLogout(){
    if(currentUser){
      addAuditLog(site,{
        user:currentUser.name, userEmail:currentUser.email,
        action:'user_logout', ref:'—', site,
        details:`Session ended`,
      });
    }
    setCurrentUser(null);
    localStorage.removeItem('sq_session');
    setPage('dashboard');
  }

  // Role-based access
  const isAdmin = currentUser?.role==='admin';
  const isManager = currentUser?.role==='manager';
  const isInspector = currentUser?.role==='inspector';
  const allowedSites = isAdmin ? SITES : (currentUser?.sites||['QS']);
  const [emailCfg, setEmailCfg] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('sq_email_cfg')||'{}'); }catch{ return {}; }
  });
  const [sampling, setSampling] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem('sq_sampling')||'{}'); }
    catch{ return {rateA:5,rateB:15,rateC:30,rateD:100,skipLotEnabled:false,skipLotThreshold:5}; }
  });
  useEffect(()=>{ localStorage.setItem('sq_sampling', JSON.stringify(sampling)); },[sampling]);

  // Persist emailCfg to localStorage
  useEffect(()=>{ localStorage.setItem('sq_email_cfg', JSON.stringify(emailCfg)); },[emailCfg]);

  const t = (k) => (I18N[lang]||I18N.en)[k] || k;

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', dark?'dark':'light');
    localStorage.setItem('sqm_theme', dark?'dark':'light');
  },[dark]);

  // ── AUTO EMAIL ────────────────────────────────────────
  async function sendAutoEmail(eventType, data){
    if(!emailCfg.publicKey||!emailCfg.serviceId||!emailCfg.templateId||!emailCfg.recipients) return;
    try{
      window.emailjs.init(emailCfg.publicKey);
      const defectList = data.defects?.map(d=>`• ${d.label}${d.qty?` (${d.qty})`:''}`).join('\n')||'—';
      const decMap={'use-as-is':'✅ Use as Is','rework':'🔧 Rework','rejected':'❌ Rejected','waiting':'⏳ Waiting for decision'};
      let subject='', message='';
      if(eventType==='inspection'){
        subject=`[SupplierQ] Inspection ${data.ref} — ${data.supplier} — ${(decMap[data.decision]||data.decision).replace(/[✅🔧❌⏳]/g,'').trim()}`;
        message=`Inspection Report\n\nReport #: ${data.ref}\nSite: ${data.site}\nDate: ${data.date}\nSupplier: ${data.supplier||'—'}\nProduct #: ${data.productNo||'—'}\nP.O. #: ${data.po||'—'}\nQty Received: ${data.qtyReceived}\nQty Inspected: ${data.qtyInspected}\nInspector: ${data.inspector||'—'}\nDecision: ${decMap[data.decision]||data.decision}\n\nQty Breakdown:\nUse as Is: ${data.qtyUseAsIs||0} | Rework: ${data.qtyRework||0} | Rejected: ${data.qtyRejected||0} | Waiting: ${data.qtyWaiting||0}\n\nDefects:\n${defectList}${data.issues?`\n\nNotes:\n${data.issues}`:''}`;
      } else if(eventType==='nc'){
        subject=`[SupplierQ] ⚠️ NC Detected — ${data.ref} — ${data.supplier} — ${(decMap[data.decision]||'').replace(/[✅🔧❌⏳]/g,'').trim()}`;
        message=`Non-Conformance Alert\n\nReport #: ${data.ref}\nSite: ${data.site}\nDate: ${data.date}\nSupplier: ${data.supplier||'—'}\nProduct #: ${data.productNo||'—'}\nDecision: ${decMap[data.decision]||data.decision}\nQty Rejected: ${data.qtyRejected||0} | Rework: ${data.qtyRework||0}\n\nDefects:\n${defectList}${data.issues?`\n\nIssues:\n${data.issues}`:''}`;
      } else if(eventType==='ncr'){
        subject=`[SupplierQ] 🔴 New NCR — ${data.ref} — ${data.supplier}`;
        message=`New NCR Opened\n\nNCR #: ${data.ref}\nSite: ${data.site}\nDate: ${data.date}\nSupplier: ${data.supplier||'—'}\nProduct #: ${data.productNo||'—'}\nDefect: ${data.defect||'—'}\nSeverity: ${data.severity||'—'}\nStatus: ${data.status}\nDue: ${data.dueDate||'—'}\n\nDescription:\n${data.description||'—'}\n\nCorrective Action:\n${data.corrective||'Pending'}`;
      }
      await window.emailjs.send(emailCfg.serviceId, emailCfg.templateId, {
        to_email: emailCfg.recipients,
        subject,
        report_ref: data.ref,
        site: data.site||site,
        supplier: data.supplier||'—',
        decision: decMap[data.decision]||data.decision||'—',
        inspector: data.inspector||'—',
        date: data.date,
        product_no: data.productNo||'—',
        event_type: eventType==='inspection'?'Inspection':eventType==='nc'?'NC Alert':'NCR',
        message,
      });
      showToast(`📧 ${lang==='fr'?'Email envoyé':'Email sent'} ✓`,'info');
    }catch(err){
      console.error('EmailJS error:',err);
      showToast(`Email error: ${err?.text||err?.message||'Check config'}`,'warn');
    }
  }

  useEffect(()=>{
    setSyncStatus('syncing');
    Promise.all(SITES.map(s=>ghLoad(s)))
      .then(()=>{
        setSyncStatus('ok');
        setTick(k=>k+1);
        // Safe to log login now — data is loaded
        const session = JSON.parse(localStorage.getItem('sq_session')||'null');
        if(session){
          const loginSite = session.sites?.[0]||'QS';
          addAuditLog(loginSite,{
            user:session.name, userEmail:session.email,
            action:'user_login', ref:'—', site:loginSite,
            details:`Role: ${session.role} | Sites: ${(session.sites||[]).join(', ')}`,
          });
        }
      })
      .catch(()=>{setSyncStatus('error');setTick(k=>k+1);});
  },[]);

  function showToast(msg, type='success'){
    const id=Date.now();
    const icons={success:'✅',error:'❌',warn:'⚠️',info:'ℹ️'};
    setToasts(t=>[...t,{id,msg,type,icon:icons[type]||'✅'}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000);
  }

  async function manualSync(){
    setSyncStatus('syncing');
    try{ await Promise.all(SITES.map(s=>ghLoad(s))); setSyncStatus('ok'); setTick(k=>k+1); showToast(t('synced_ok'),'success'); }
    catch{ setSyncStatus('error'); showToast('Sync error','error'); }
  }

  const inspections = getData(site,'inspections');
  const ncrs = getData(site,'ncrs');
  const suppliers = getData(site,'suppliers');

  function navTo(p){ setPage(p); setModal(null); }

  async function handleSaveInspection(rec){
    await saveRecord(site,'inspections',rec);
    setTick(k=>k+1);
    addAuditLog(site,{
      user:currentUser?.name||'?', userEmail:currentUser?.email||'',
      action:editRecord?'inspection_updated':'inspection_created',
      ref:rec.ref, site,
      details:`${rec.supplier||'—'} | ${rec.productNo||'—'} | Decision: ${rec.decision}`,
      duration: editRecord?0:(rec.duration||0),
    });
    const isNC = rec.hasNC||rec.decision==='rejected'||rec.decision==='rework'||rec.decision==='waiting';
    if(emailCfg.onInspection) sendAutoEmail('inspection', rec);
    else if(emailCfg.onNC && isNC) sendAutoEmail('nc', rec);
    if(editRecord){ setEditRecord(null); navTo('all_inspections'); }
    else navTo('dashboard');
  }

  async function handleDeleteInspection(r){
    if(!confirm(t('delete')+'?')) return;
    addAuditLog(site,{
      user:currentUser?.name||'?', userEmail:currentUser?.email||'',
      action:'inspection_deleted', ref:r.ref, site,
      details:`${r.supplier||'—'} | ${r.productNo||'—'}`,
    });
    await deleteRecord(site,'inspections',r.id);
    setTick(k=>k+1); setModal(null);
    showToast(t('deleted_ok'),'warn');
  }

  async function handleSaveNcr(rec){
    await saveRecord(site,'ncrs',rec);
    setTick(k=>k+1);
    addAuditLog(site,{
      user:currentUser?.name||'?', userEmail:currentUser?.email||'',
      action:'ncr_created', ref:rec.ref, site,
      details:`${rec.supplier||'—'} | ${rec.defect||'—'} | ${rec.severity}`,
    });
    if(emailCfg.onNCR && rec.status==='open') sendAutoEmail('ncr', rec);
    navTo('ncr_dashboard');
  }

  async function handleSaveSupplier(s){
    await saveRecord(site,'suppliers',s);
    setTick(k=>k+1);
    addAuditLog(site,{
      user:currentUser?.name||'?', userEmail:currentUser?.email||'',
      action:'supplier_created', ref:s.name, site,
      details:`${s.name} | ${s.country||'—'} | ${s.role||'active'}`,
    });
    navTo('supplier_list');
  }

  async function handleDeleteSupplier(name){
    addAuditLog(site,{
      user:currentUser?.name||'?', userEmail:currentUser?.email||'',
      action:'supplier_deleted', ref:name, site, details:name,
    });
    await deleteRecord(site,'suppliers',name);
    setTick(k=>k+1); showToast(t('deleted_ok'),'warn');
  }

  function exportData(){
    const data={};
    SITES.forEach(s=>{ data[s]=_cache[s]||{}; });
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='supplierq_export.json'; a.click();
    showToast('Exported ✓','success');
  }

  function importData(e){
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        SITES.forEach(s=>{ if(d[s]) _cache[s]=d[s]; });
        Promise.all(SITES.map(s=>ghSave(s))).catch(console.error);
        setTick(k=>k+1); showToast('Imported ✓','success');
      }catch{ showToast('Import error','error'); }
    };
    reader.readAsText(f);
  }

  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [collapsedSections, setCollapsedSections] = useState({});

  function toggleSection(sec){
    setCollapsedSections(s=>({...s,[sec]:!s[sec]}));
  }

  const NAV = [
    {section: t('receiving'), id:'reception', items:[
      {id:'dashboard',      icon:'📊', label:t('dashboard')},
      {id:'new_inspection', icon:'➕', label:t('new_insp')},
      {id:'all_inspections',icon:'📋', label:t('all_insp')},
    ]},
    {section: t('non_conf'), id:'ncr', items:[
      {id:'ncr_dashboard',  icon:'⚠️', label:t('ncr_dash')},
      {id:'new_ncr',        icon:'➕', label:t('new_ncr')},
      {id:'all_ncrs',       icon:'📋', label:t('all_ncrs')},
    ]},
    {section: t('suppliers'), id:'suppliers', items:[
      {id:'supplier_list',  icon:'🏢', label:t('suppliers')},
      {id:'add_supplier',   icon:'➕', label:t('add_sup')},
    ]},
    {section: t('scorecard'), id:'scorecard', items:[
      {id:'consolidated',   icon:'🌐', label:t('consolidated')},
      {id:'scorecards',     icon:'⭐', label:t('scorecards')},
      {id:'ranking',        icon:'🏆', label:t('ranking')},
    ]},
    {section: t('settings'), id:'settings', items:[
      {id:'gh_storage',     icon:'☁️', label:t('gh_storage')},
      {id:'score_weights',  icon:'⚖️', label:t('score_weights')},
      {id:'email_settings', icon:'📧', label:lang==='fr'?'Emails automatiques':'Auto Emails'},
      ...(isAdmin?[{id:'user_management',icon:'👥',label:lang==='fr'?'Utilisateurs':'Users'}]:[]),
      {id:'sampling_plans',icon:'📊',label:lang==='fr'?'Plans échantillonnage':'Sampling Plans'},
      {id:'audit_trail',   icon:'📜',label:lang==='fr'?'Audit Trail':'Audit Trail'},
    ]},
  ];

  const openNcrCount = ncrs.filter(r=>r.status==='open').length;

  const pageModMap={dashboard:'Inspection',new_inspection:'Inspection',all_inspections:'Inspection',
    ncr_dashboard:'NCR',new_ncr:'NCR',all_ncrs:'NCR',
    supplier_list:'Suppliers',add_supplier:'Suppliers',
    consolidated:'Scorecard',scorecards:'Scorecard',ranking:'Scorecard',
    gh_storage:'Settings',score_weights:'Settings',email_settings:'Settings',user_management:'Settings',sampling_plans:'Settings',audit_trail:'Settings'};

  const renderPage = () => {
    switch(page){
      case 'dashboard': return <Dashboard site={site} lang={lang} t={t} inspections={inspections} ncrs={ncrs}
        onNewInsp={()=>navTo('new_inspection')}
        onViewInsp={r=>setModal({type:'inspection',record:r})}/>;
      case 'new_inspection': return <InspectionForm site={site} lang={lang} t={t} suppliers={suppliers}
        onSave={handleSaveInspection} editRecord={editRecord}
        onCancelEdit={()=>{setEditRecord(null);navTo('all_inspections');}}
        showToast={showToast} sampling={sampling} inspections={inspections} weights={weights} thresholds={thresholds}/>;
      case 'all_inspections': return <AllInspections site={site} lang={lang} t={t} data={inspections}
        onView={r=>setModal({type:'inspection',record:r})}
        onEdit={r=>{setEditRecord(r);navTo('new_inspection');}}
        onDelete={handleDeleteInspection}/>;
      case 'ncr_dashboard': return <NcrDashboard site={site} lang={lang} t={t} ncrs={ncrs}
        onNewNcr={()=>navTo('new_ncr')} onView={r=>setModal({type:'ncr',record:r})}/>;
      case 'new_ncr': return <NcrForm site={site} lang={lang} t={t} suppliers={suppliers} onSave={handleSaveNcr} showToast={showToast}/>;
      case 'all_ncrs': return <NcrDashboard site={site} lang={lang} t={t} ncrs={ncrs}
        onNewNcr={()=>navTo('new_ncr')} onView={r=>setModal({type:'ncr',record:r})}/>;
      case 'supplier_list': return <SupplierList site={site} lang={lang} t={t} suppliers={suppliers}
        onDelete={handleDeleteSupplier} showToast={showToast}/>;
      case 'add_supplier': return <AddSupplier site={site} lang={lang} t={t} onSave={handleSaveSupplier} showToast={showToast}/>;
      case 'consolidated': return <Consolidated lang={lang} t={t}/>;
      case 'scorecards': return <Scorecards lang={lang} t={t} suppliers={getAllData('suppliers')} weights={weights} thresholds={thresholds}/>;
      case 'ranking': return <Ranking lang={lang} t={t} weights={weights} thresholds={thresholds}/>;
      case 'gh_storage': return <GithubStorage lang={lang} t={t} syncStatus={syncStatus}/>;
      case 'score_weights': return <ScoreWeights lang={lang} t={t} weights={weights} thresholds={thresholds} setWeights={setWeights} setThresholds={setThresholds}/>;
      case 'email_settings': return <EmailSettings lang={lang} t={t} emailCfg={emailCfg} setEmailCfg={setEmailCfg} showToast={showToast}/>;
      case 'user_management': return isAdmin?<UserManagement lang={lang} currentUser={currentUser} showToast={showToast}/>:<div className="page"><div className="empty">🔒 Access denied</div></div>;
      case 'sampling_plans': return <SamplingPlans lang={lang} sampling={sampling} setSampling={setSampling}/>;
      case 'audit_trail':    return <AuditTrail lang={lang} site={site}/>;      default: return <div className="page"><div className="empty">Page not found</div></div>;
    }
  };

  return <>
    {/* LOGIN GATE */}
    {!currentUser && <LoginScreen onLogin={handleLogin} lang={lang} setLang={setLang} dark={dark} setDark={setDark}/>}
    {/* FORCE PASSWORD CHANGE */}
    {currentUser?.mustChangePassword && <ForcePasswordChange
      user={currentUser} lang={lang}
      onComplete={updatedUser=>{
        setCurrentUser(updatedUser);
        localStorage.setItem('sq_session', JSON.stringify(updatedUser));
        showToast(lang==='fr'?'Mot de passe mis à jour ✓':'Password updated ✓','success');
      }}/>}
    {/* MINIMAL HEADER — logo + module + right actions */}
    <header className="hdr">
      <div className="hdr-logo">
        <div className="hdr-logo-icon">SQ</div>
        <div>
          <div style={{fontSize:13,fontWeight:700,lineHeight:1.2}}>SupplierQ</div>
          <div style={{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em',fontWeight:600}}>by Foliot</div>
        </div>
      </div>
      <div className="hdr-sep"/>
      <span className="hdr-mod">{pageModMap[page]||'SupplierQ'}</span>
      <div className="hdr-r">
        <button className="theme-btn" onClick={()=>setDark(d=>!d)}>{dark?'☀️':'🌙'}</button>
        <button className="lang-btn" onClick={()=>setLang(l=>l==='en'?'fr':'en')} style={{fontSize:11}}>⬇️ Export</button>
        <label className="lang-btn" style={{fontSize:11,cursor:'pointer'}}>
          ⬆️ Import<input type="file" accept=".json" style={{display:'none'}} onChange={importData}/>
        </label>
      </div>
    </header>

    {/* LAYOUT */}
    <div className="layout" style={{position:'relative'}}>

      {/* ── SIDEBAR — Cadence style ── */}
      <nav className="sidebar" style={{width: sidebarOpen ? 'var(--sb)' : '0', overflow: sidebarOpen ? undefined : 'hidden', transition:'width .2s'}}>

        {/* Site selector — restricted to user's allowed sites */}
        <div className="sb-site" onClick={()=>allowedSites.length>1&&setSiteDD(d=>!d)} style={{position:'relative',cursor:allowedSites.length>1?'pointer':'default'}}>
          <span className="sb-site-badge">{site}</span>
          <span className="sb-site-name">{SITE_NAMES[site]}</span>
          <span className="sb-site-sync" onClick={e=>{e.stopPropagation();manualSync();}}>
            <span className={`sdot${syncStatus==='syncing'?' syncing':syncStatus==='error'?' error':''}`} style={{display:'inline-block'}}/>
          </span>
          <button className="sb-close" onClick={e=>{e.stopPropagation();setSidebarOpen(false);}} style={{marginLeft:4}}>✕</button>
          {siteDD && allowedSites.length>1 && <div className="sb-site-dd" onClick={e=>e.stopPropagation()}>
            {allowedSites.map(s=><div key={s} className={`sb-site-opt${site===s?' active':''}`}
              onClick={()=>{setSite(s);setSiteDD(false);setTick(k=>k+1);}}>
              <span className="sb-site-opt-badge">{s}</span>
              {SITE_NAMES[s]}
            </div>)}
          </div>}
        </div>

        {/* Nav items — all sections collapsible */}
        <div className="sb-nav">
          {NAV.map(sec=>{
            const collapsed = collapsedSections[sec.id];
            return <div key={sec.id} className="sb-section">
              <div className="sb-section-header" onClick={()=>toggleSection(sec.id)}>
                <span className="sb-section-label">{sec.section}</span>
                <span className={`sb-chevron${collapsed?'':' open'}`}>▾</span>
              </div>
              {!collapsed && sec.items.map(item=>(
                <button key={item.id} className={`nav-item${page===item.id?' active':''}`} onClick={()=>navTo(item.id)}>
                  <span className="nav-ic">{item.icon}</span>
                  {item.label}
                  {item.id==='ncr_dashboard'&&openNcrCount>0&&<span className="nav-badge">{openNcrCount}</span>}
                </button>
              ))}
            </div>;
          })}
        </div>

        {/* Bottom: lang + user */}
        <div className="sb-bottom">
          <div className="sb-lang-row">
            <button className={`sb-lang-btn${lang==='fr'?' active':''}`} onClick={()=>setLang('fr')}>FR</button>
            <button className={`sb-lang-btn${lang==='en'?' active':''}`} onClick={()=>setLang('en')}>EN</button>
          </div>
          <div className="sb-user">
            <div className="sb-user-info">
              <div className="sb-avatar" style={{background:avatarColor(currentUser?.name||'?')}}>
                {(currentUser?.name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}
              </div>
              <div>
                <div className="sb-user-name">{currentUser?.name||'—'}</div>
                <div className="sb-user-role" style={{display:'flex',alignItems:'center',gap:5}}>
                  <span className={`role-badge ${currentUser?.role==='admin'?'role-admin':currentUser?.role==='manager'?'role-manager':'role-inspector'}`}>
                    {currentUser?.role==='admin'?'Admin':currentUser?.role==='manager'?'Manager':'Inspector'}
                  </span>
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:4}}>
              <button className="theme-btn" onClick={()=>setDark(d=>!d)} style={{background:'none',border:'none',fontSize:16,cursor:'pointer',padding:4}}>{dark?'☀️':'🌙'}</button>
              <button onClick={handleLogout} title={lang==='fr'?'Déconnexion':'Sign out'}
                style={{background:'none',border:'none',fontSize:16,cursor:'pointer',padding:4,color:'var(--muted)'}}>🚪</button>
            </div>
          </div>
        </div>
      </nav>

      {/* Sidebar toggle (when closed) */}
      {!sidebarOpen && <button onClick={()=>setSidebarOpen(true)} style={{
        position:'absolute',top:72,left:0,zIndex:50,
        background:'var(--surf)',border:'1px solid var(--brd)',borderLeft:'none',
        borderRadius:'0 6px 6px 0',padding:'10px 8px',cursor:'pointer',
        boxShadow:'var(--sh1)',color:'var(--tx2)',fontSize:16,
      }}>☰</button>}

      {/* CONTENT */}
      <main className="content">
        {renderPage()}
      </main>
    </div>

    {/* BOTTOM NAV (mobile) */}
    <nav className="bottom-nav">
      {[{id:'dashboard',ic:'📊',l:'Dashboard'},{id:'new_inspection',ic:'➕',l:'New'},{id:'all_inspections',ic:'📋',l:'List'},{id:'ncr_dashboard',ic:'⚠️',l:'NCR'},{id:'scorecards',ic:'⭐',l:'Score'}].map(item=>(
        <button key={item.id} className={`bn-item${page===item.id?' active':''}`} onClick={()=>navTo(item.id)}>
          <span className="bn-ic">{item.ic}</span>
          <span>{item.l}</span>
          {item.id==='ncr_dashboard'&&openNcrCount>0&&<span style={{position:'absolute',top:4,right:'calc(50% - 18px)',background:'var(--red)',color:'#fff',fontSize:9,fontWeight:700,padding:'1px 4px',borderRadius:10}}>{openNcrCount}</span>}
        </button>
      ))}
    </nav>

    {/* MODALS */}
    {modal?.type==='inspection' && <InspectionModal
      record={modal.record} lang={lang} t={t}
      onClose={()=>setModal(null)}
      onEdit={()=>{setEditRecord(modal.record);setModal(null);navTo('new_inspection');}}
      onDelete={()=>handleDeleteInspection(modal.record)}
      onEmail={()=>setModal({type:'email',record:modal.record})}/>}
    {modal?.type==='email' && <EmailModal record={modal.record} lang={lang} t={t} onClose={()=>setModal(null)}/>}

    <Toast toasts={toasts}/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
